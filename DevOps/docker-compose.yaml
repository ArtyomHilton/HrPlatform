services:
    hrplatform-postgres:
        container_name: 'HrPlatform-Postgres'
        image: postgres:18-alpine
        restart: always
        ports:
            - 5433:5432
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - hrplatform-postgres:/var/lib/postgresql/data

volumes:
    hrplatform-postgres:
        driver: local