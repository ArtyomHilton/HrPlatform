services:
    hrplatform-postgres:
        container_name: 'HrPlatform-Postgres'
        image: postgres:18-alpine
        restart: always
        ports:
            - 5433:5432
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - hrplatform-postgres:/var/lib/postgresql/data
    
    rabbitmq:
        container_name: 'HrPlatform-RabbitMQ'
        image: rabbitmq:4.2.1-management-alpine
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
        volumes:
            - hrplatform-rabbitmq-data:/var/lib/rabbimq
            - hrplatform-rabbitmq-log:/var/log/rabbimq

volumes:
    hrplatform-postgres:
        driver: local
    hrplatform-rabbitmq-data:
        driver: local
    hrplatform-rabbitmq-log:
        driver: local